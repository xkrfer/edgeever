name: Sync upstream

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    name: Merge upstream main
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch and merge upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/tianma-if/edgeever.git
          git fetch upstream main

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Fork is already up to date."
            exit 0
          fi

          git merge --no-edit -m "chore: sync upstream [skip ci]" upstream/main
          git push origin main
